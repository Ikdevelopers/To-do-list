<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Dashboard</title>
    
    <!-- ✅ Load BOTH stylesheets -->
    <link rel="stylesheet" href="../css/nav.css">
    <link rel="stylesheet" href="../css/style.css">    
    <!-- Google Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>

    <!-- ✅ Sidebar Navigation -->
    <aside class="sidebar">
        <header class="sidebar-header">
            <a href="" class="logo">
                <img src="../img/Site Icon.png" alt="Logo">
            </a>
            
            <!-- ✅ Toggle button to collapse/expand sidebar -->
            <button class="toggle sidebar-toggle" aria-label="Collapse sidebar">
                <span class="material-symbols-outlined">chevron_left</span>
            </button>
            
            <!-- ✅ Mobile menu toggle -->
            <button class="toggle menu-toggle" aria-label="Toggle menu">
                <span class="material-symbols-outlined">menu</span>
            </button>
        </header>

        <nav class="sidebar-nav">
            <!-- Primary Nav -->
            <ul class="nav-list primary-nav">
                <li class="nav-item">
                    <a class="nav-link" href="../index.html">
                        <span class="nav-icon material-symbols-outlined">add_task</span>
                        <span class="nav-label">Add Task</span>
                    </a>
                    <span class="nav-tooltip">Add Task</span>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="planned.html">
                        <span class="nav-icon material-symbols-outlined">task</span>
                        <span class="nav-label">Planned</span>
                    </a>
                    <span class="nav-tooltip">Planned</span>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="calendar.html">
                        <span class="nav-icon material-symbols-outlined">calendar_today</span>
                        <span class="nav-label">Calendar</span>
                    </a>
                    <span class="nav-tooltip">Calendar</span>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <span class="nav-icon material-symbols-outlined">label_important</span>
                        <span class="nav-label">Important</span>
                    </a>
                    <span class="nav-tooltip">Important</span>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="settings.html">
                        <span class="nav-icon material-symbols-outlined">settings</span>
                        <span class="nav-label">Settings</span>
                    </a>
                    <span class="nav-tooltip">Settings</span>
                </li>
            </ul>
        </nav>
    </aside>

    <!-- ✅ Main Content -->
    <main class="main-content">
    <div class="wrapper planned">
        <h2>Settings</h2>
        <div class="settings-section">
            <h3>Change Theme According to your choice</h3>
            <div class="theme-options">
                <button class="theme-btn" id="btnLight">Light</button>
                <button class="theme-btn" id="btnDark">Dark</button>
            </div>
        </div>
    </div>         <!-- ← closes .wrapper -->
</main>

    <script src="../js/script.js"></script>
    <script src="../js/settings.js"></script>
</body>
